name: Sync Readset (Remote Repo)

on:
  workflow_dispatch:
    inputs:
      system_key:
        description: "System key from systems.config.json"
        required: true
        type: choice
        options:
          - disb-heto
          - disburse
          - heto
          - ndf
          - ops-heto
          - ssf
      commit_changes:
        description: "Commit updated output file back to this repo"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

    steps:
      - name: Checkout tool repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve source repo from systems config
        shell: bash
        run: |
          set -euo pipefail

          SYSTEM_KEY="${{ inputs.system_key }}"
          REPO_URL="$(node -e "
            const fs = require('node:fs');
            const cfg = JSON.parse(fs.readFileSync('systems.config.json', 'utf8'));
            const system = (cfg.systems || []).find((item) => item.key === process.argv[1]);
            if (!system) {
              console.error('Unknown system key: ' + process.argv[1]);
              process.exit(1);
            }
            if (!system.sourceRepoUrl || !String(system.sourceRepoUrl).trim()) {
              console.error('Missing sourceRepoUrl for system: ' + process.argv[1]);
              process.exit(1);
            }
            process.stdout.write(String(system.sourceRepoUrl).trim());
          " "$SYSTEM_KEY")"

          REPO_REF="$(node -e "
            const fs = require('node:fs');
            const cfg = JSON.parse(fs.readFileSync('systems.config.json', 'utf8'));
            const system = (cfg.systems || []).find((item) => item.key === process.argv[1]);
            if (!system) {
              process.exit(1);
            }
            process.stdout.write(String(system.sourceRepoRef || '').trim());
          " "$SYSTEM_KEY")"

          echo "RESOLVED_REPO_URL=$REPO_URL" >> "$GITHUB_ENV"
          echo "RESOLVED_REPO_REF=$REPO_REF" >> "$GITHUB_ENV"

      - name: Clone source repository
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_DIR="$RUNNER_TEMP/source-repo"
          RAW_REPO_URL="$RESOLVED_REPO_URL"
          REPO_URL="$RAW_REPO_URL"

          # Support accidental markdown-style input like [label](https://github.com/org/repo.git)
          if [[ "$REPO_URL" == \[*\]\(*\) ]]; then
            REPO_URL="${REPO_URL#*(}"
            REPO_URL="${REPO_URL%)}"
          fi

          # If cloning a private GitHub repo over HTTPS, use optional secret token.
          if [[ "$REPO_URL" == https://github.com/* ]] && [[ -n "${SOURCE_REPO_TOKEN:-}" ]]; then
            AUTH_B64="$(printf 'x-access-token:%s' "$SOURCE_REPO_TOKEN" | base64 | tr -d '\n')"
            if [ -n "$RESOLVED_REPO_REF" ]; then
              git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $AUTH_B64" \
                clone --depth 1 --branch "$RESOLVED_REPO_REF" "$REPO_URL" "$SOURCE_DIR"
            else
              git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $AUTH_B64" \
                clone --depth 1 "$REPO_URL" "$SOURCE_DIR"
            fi
          else
            if [ -n "$RESOLVED_REPO_REF" ]; then
              git clone --depth 1 --branch "$RESOLVED_REPO_REF" "$REPO_URL" "$SOURCE_DIR"
            else
              git clone --depth 1 "$REPO_URL" "$SOURCE_DIR"
            fi
          fi

          echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"

      - name: Run sync-readset
        run: npm run sync-readset -- "${{ inputs.system_key }}" --repo-path "$SOURCE_DIR"

      - name: Upload synced output artifact
        uses: actions/upload-artifact@v4
        with:
          name: readset-output-${{ inputs.system_key }}
          path: public/readset-output-${{ inputs.system_key }}.json

      - name: Commit updated output file
        if: inputs.commit_changes == true
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_FILE="public/readset-output-${{ inputs.system_key }}.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "No changes detected for $OUTPUT_FILE"
            exit 0
          fi

          git commit -m "chore(readset): sync ${{ inputs.system_key }} from remote repo"
          git push
